kind: pipeline
type: docker
name: nestjs-ci-pipeline

steps:
  - name: install-dependencies
    image: node:20
    commands:
      - corepack enable
      - corepack prepare pnpm@latest --activate
      - pnpm install

  - name: run-tests
    image: node:20
    commands:
      - corepack enable
      - pnpm run test

  - name: build-and-push-to-ghcr
    image: plugins/docker
    settings:
      registry: ghcr.io
      repo: ghcr.io/ahmaddassegaff/app 
      auto_tag: true
      username:
        from_secret: ghcr_username
      password:
        from_secret: ghcr_token

trigger:
  branch:
    - main
