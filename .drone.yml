kind: pipeline
type: docker
name: nestjs-ci-cd

steps:
  - name: test
    image: node:22-slim
    commands:
      - corepack enable
      - corepack prepare pnpm@latest --activate
      - pnpm install
      - pnpm run test

  - name: deploy
    image: alpine
    environment:
      VPS_IP:
        from_secret: VPS_IP
      SSH_KEY:
        from_secret: SSH_KEY
    commands:
      - apk add --no-cache openssh-client git

      - mkdir -p ~/.ssh
      - echo "$SSH_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - ssh-keyscan -H $VPS_IP >> ~/.ssh/known_hosts

      - |
        ssh -p 22 ahmadasgf@$VPS_IP << 'EOF'
          set -e

          export PATH="$HOME/.nvm/versions/node/v22.22.2/bin:$PATH"

          mkdir -p ~/apps/shorten-link
          cd ~/apps/shorten-link

          if [ ! -d ".git" ]; then
            git clone https://github.com/ahmaddassegaff/shorten-link .
          fi

          git fetch origin
          git reset --hard origin/main

          pnpm install
          pnpm run build

          if pm2 describe shorten-link > /dev/null; then
            pm2 reload shorten-link
          else
            pm2 start dist/main.js --name shorten-link
          fi

          pm2 save
        EOF

trigger:
  branch:
    - main
