kind: pipeline
type: docker
name: nestjs-ci-cd-pipeline

steps:
  - name: install-and-test
    image: node:22-slim
    commands:
      - corepack enable
      - corepack prepare pnpm@latest --activate
      - pnpm install
      - npx prisma generate 
      - pnpm run test

  - name: build-and-push-to-ghcr
    image: plugins/docker
    settings:
      registry: ghcr.io
      repo: ghcr.io/ahmaddassegaff/shorten-link
      auto_tag: true
      pull: true
      cache_from:
        - ghcr.io/ahmaddassegaff/shorten-link
      username:
        from_secret: GHCR_USERNAME
      password:
        from_secret: GHCR_TOKEN
      build_args:
        BUILDKIT_INLINE_CACHE: 1

  - name: deploy-to-vps
    image: appleboy/drone-ssh
    environment:
      GHCR_USERNAME:
        from_secret: GHCR_USERNAME
      GHCR_TOKEN:
        from_secret: GHCR_TOKEN
    settings:
      host: drone.ahmadasgf.my.id
      username: ahmadasgf
      key:
        from_secret: SSH_KEY
      port: 22
      script:
        - echo "Login as $GHCR_USERNAME"
        - echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
        - cd ~/config-server/shorten-link-deployment
        - sudo docker compose pull
        - sudo docker compose up -d --force-recreate
        - sudo docker image prune -f
        - sudo docker logout ghcr.io

trigger:
  branch:
    - main
