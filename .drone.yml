kind: pipeline
type: docker
name: nestjs-ci-pipeline

steps:
  - name: install-dependencies
    image: node:20
    commands:
      - corepack enable
      - corepack prepare pnpm@latest --activate
      - pnpm install

  - name: run-tests
    image: node:20
    commands:
      - corepack enable
      - pnpm run test

  - name: build-and-push-to-ghcr
    image: plugins/docker
    settings:
      registry: ghcr.io
      repo: ghcr.io/ahmaddassegaff/shorten-link
      auto_tag: true
      username:
        from_secret: ghcr_username
      password:
        from_secret: ghcr_token
      dockerfile: Dockerfile

  - name: deploy-to-vps
    image: appleboy/drone-ssh
    settings:
      host: drone.ahmadasgf.my.id
      username: ahmadasgf
      key:
        from_secret: ssh_key
      port: 22
      envs:
        - ghcr_token
        - ghcr_username
      script:
        - echo $ghcr_token | sudo docker login ghcr.io -u $ghcr_username --password-stdin
        - cd ~/config-server/shorten-link-deployment
        - sudo docker compose pull
        - sudo docker compose up -d
        - sudo docker image prune -f
        - sudo docker logout ghcr.io

trigger:
  branch:
    - main
